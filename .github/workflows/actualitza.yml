name: Actualitza i publica AEMET

on:
  schedule:
    - cron: "13,43 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publica:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Baixa d'AEMET
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
        run: python fetch_encrypta.py

      - name: Prepara el lloc web
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp dades.json _site/dades.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
