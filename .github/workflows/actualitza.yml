name: Actualitza dades AEMET

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: actualitza-aemet
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Baixa d'AEMET
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
        run: python fetch_encrypta.py

      - name: Publica dades.json
        run: |
          git config user.name "aemet-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dades.json
          git commit -m "Actualitza dades AEMET" || echo "sense canvis"
          git push
