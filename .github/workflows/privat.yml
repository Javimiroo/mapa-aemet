name: Actualitza mapa privat (AEMET + Meteocat)

on:
  workflow_dispatch: {}   # manual (des del botó del mapa o des de la pestanya Actions)
  schedule:
    # HORÀRIA. Des que XEMA es baixa per Dades Obertes (sense quota mensual) la
    # freqüència ja no la limita Meteocat: el portal publica per blocs ~horaris amb
    # 30-90 min de retard, així que actualitzar cada hora és l'òptim (més sovint
    # seria rebaixar les mateixes dades). El repo no creix perquè les dades vives
    # van a la branca 'dades' amb force-push; a 'main' només hi va l'arxiu (1/dia).
    - cron: "10 * * * *"

permissions:
  contents: write

concurrency:
  group: privat
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install cryptography tzdata numpy scipy

      - name: Baixa AEMET + Meteocat i xifra
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          METEOCAT_KEY: ${{ secrets.METEOCAT_KEY }}
          MAPA_PASS: ${{ secrets.MAPA_PASS }}
        run: python fetch_privat.py

      # 1) ARXIU: historial normal a 'main' (només canvia quan es tanca un dia)
      - name: Publica l'arxiu (main)
        run: |
          git config user.name "aemet-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f meteocat_estacions.json ] && git add meteocat_estacions.json || true
          [ -d arxiu ] && git add arxiu || true
          [ -d arxiu-vent ] && git add arxiu-vent || true
          if git commit -m "Arxiu (AEMET+Meteocat)"; then
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break || sleep 6
            done
          else
            echo "sense canvis a l'arxiu"
          fi

      # 2) DADES VIVES: branca 'dades' SENSE historial (força-push d'un únic commit).
      #    Així el repo no creix encara que actualitzem cada hora, i no dispara Pages.
      - name: Publica les dades vives (branca 'dades')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUB=$(mktemp -d)
          for f in dades_privat.enc vent_privat.enc; do
            [ -f "$f" ] && cp "$f" "$PUB/" || echo "avis: $f no existeix"
          done
          if [ -z "$(ls -A "$PUB")" ]; then echo "res a publicar"; exit 0; fi
          cd "$PUB"
          git init -q -b dades
          git add -A
          git -c user.name="aemet-bot" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -q -m "dades $(date -u +%FT%TZ)"
          git push -q --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" dades
          echo "publicat a la branca 'dades' ($(ls | tr '\n' ' '))"
