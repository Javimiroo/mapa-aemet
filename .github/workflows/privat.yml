name: Actualitza mapa privat (AEMET + Meteocat)

on:
  workflow_dispatch: {}   # manual (des del botó del mapa o des de la pestanya Actions)
  schedule:
    # 4 actualitzacions automàtiques al dia (hora UTC). La de 23:35 UTC = 01:35 local
    # captura la matinada (00:00–02:00 local) i evita el forat que trencava el comptador.
    # Meteocat: 4 baixades/dia x 5 consultes = ~600/mes (deixa marge per a les manuals).
    - cron: "35 23,3 * * *"

permissions:
  contents: write

concurrency:
  group: privat
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install cryptography

      - name: Baixa AEMET + Meteocat i xifra
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          METEOCAT_KEY: ${{ secrets.METEOCAT_KEY }}
          MAPA_PASS: ${{ secrets.MAPA_PASS }}
        run: python fetch_privat.py

      - name: Publica (dades xifrades + coordenades)
        run: |
          git config user.name "aemet-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dades_privat.enc meteocat_estacions.json
          git commit -m "Actualitza mapa privat (AEMET+Meteocat)" || echo "sense canvis"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 6
          done
