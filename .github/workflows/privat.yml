name: Actualitza mapa privat (AEMET + Meteocat)

on:
  workflow_dispatch: {}   # manual (des del botó del mapa o des de la pestanya Actions)
  schedule:
    # 2 actualitzacions automàtiques al dia (hora UTC). Amb 11 variables Meteocat
    # (vent a 2/6/10 m), 2 baixades/dia x 11 = ~660/mes (marge per a les manuals).
    # La de 23:35 UTC = 01:35 local captura la matinada (00:00–02:00 local) i evita
    # el forat que trencava el comptador. Meteocat baixa el dia sencer, així que 2
    # execucions ja deixen l'històric complet; el botó manual dona la frescor puntual.
    - cron: "35 11,23 * * *"

permissions:
  contents: write

concurrency:
  group: privat
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install cryptography tzdata

      - name: Baixa AEMET + Meteocat i xifra
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          METEOCAT_KEY: ${{ secrets.METEOCAT_KEY }}
          MAPA_PASS: ${{ secrets.MAPA_PASS }}
        run: python fetch_privat.py

      - name: Publica (dades xifrades + coordenades)
        run: |
          git config user.name "aemet-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dades_privat.enc meteocat_estacions.json arxiu
          git commit -m "Actualitza mapa privat (AEMET+Meteocat)" || echo "sense canvis"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 6
          done
