name: Actualitza mapa privat (AEMET + Meteocat)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "35 5,11,17,23 * * *"

permissions:
  contents: write

concurrency:
  group: privat
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependencies
        run: pip install cryptography

      - name: Baixa AEMET + Meteocat i xifra
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          METEOCAT_KEY: ${{ secrets.METEOCAT_KEY }}
          MAPA_PASS: ${{ secrets.MAPA_PASS }}
        run: python fetch_privat.py

      - name: Publica
        run: |
          git config user.name "aemet-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dades_privat.enc meteocat_estacions.json
          git commit -m "Actualitza mapa privat" || echo "sense canvis"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 6
          done
