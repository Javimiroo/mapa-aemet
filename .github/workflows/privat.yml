name: Actualitza mapa privat (AEMET + Meteocat)

on:
  workflow_dispatch: {}   # manual (des del botó del mapa o des de la pestanya Actions)
  schedule:
    # 1 actualització automàtica al dia (hora UTC). Ara Meteocat baixa AHIR+HUI amb
    # 11 variables = 22 consultes/execució; 1/dia = ~660/mes (marge per a les manuals,
    # dins del límit de 750/mes). Com que baixem ahir+hui, l'històric queda SEMPRE
    # complet passe el que passe amb els horaris; la frescor puntual la dona el botó
    # manual. NOTA: si es puja la quota de Meteocat, es pot tornar a 2-4/dia.
    - cron: "35 11 * * *"

permissions:
  contents: write

concurrency:
  group: privat
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install cryptography tzdata numpy scipy

      - name: Baixa AEMET + Meteocat i xifra
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          METEOCAT_KEY: ${{ secrets.METEOCAT_KEY }}
          MAPA_PASS: ${{ secrets.MAPA_PASS }}
        run: python fetch_privat.py

      - name: Publica (dades xifrades + coordenades)
        run: |
          git config user.name "aemet-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in dades_privat.enc vent_privat.enc meteocat_estacions.json; do
            [ -f "$f" ] && git add "$f" || echo "avis: $f no existeix, no s'afig"
          done
          [ -d arxiu ] && git add arxiu || echo "avis: sense carpeta arxiu"
          [ -d arxiu-vent ] && git add arxiu-vent || echo "avis: sense carpeta arxiu-vent"
          git commit -m "Actualitza mapa privat (AEMET+Meteocat)" || echo "sense canvis"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 6
          done
