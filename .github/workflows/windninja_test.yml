name: PROVA WindNinja en Docker (fase 2A)

# Prova de viabilitat: comprova si WindNinja es pot executar al runner, quant
# tarda cada solver i quanta memòria gasta. NO toca res del sistema en marxa:
# els resultats es pugen com a artefactes per a descarregar-los i mirar-los.

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: "Caixa lon0,lat0,lon1,lat1 (per defecte Prades–Montsant)"
        required: false
        default: "0.68,41.08,1.18,41.45"
      mesh:
        description: "Resolució de malla de WindNinja (m)"
        required: false
        default: "100"
      dem_res:
        description: "Resolució del DEM (m)"
        required: false
        default: "50"

jobs:
  prova:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: Recursos del runner
        run: |
          echo "--- CPU ---";  nproc; lscpu | grep -m1 'Model name' || true
          echo "--- RAM ---";  free -h
          echo "--- Disc ---"; df -h / | tail -1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Dependències
        run: pip install numpy pillow rasterio

      - name: Prepara DEM i estacions
        run: |
          python windninja_prep.py --bbox "${{ github.event.inputs.bbox }}" \
            --out wn --res "${{ github.event.inputs.dem_res }}" \
            --mesh "${{ github.event.inputs.mesh }}"
          echo "--- contingut ---"; find wn -maxdepth 2 -type f | head -40
          du -sh wn

      # No hi ha imatge oficial de firelab a Docker Hub. Provem les de la comunitat
      # en ordre de preferència i ens quedem amb la primera que porte WindNinja_cli.
      - name: Tria i descarrega una imatge de WindNinja
        id: img
        run: |
          CANDIDATES="ekeenan/windninja-momentum ekeenan/ubuntu-windninja cgauvi/windninja vsantalov/windninja usdaarsnwrc/katana"
          FOUND=""
          for IM in $CANDIDATES; do
            echo "::group::provant $IM"
            t0=$(date +%s)
            if timeout 900 docker pull "$IM:latest" >/dev/null 2>&1; then
              echo "  pull OK en $(( $(date +%s) - t0 )) s"
              for BIN in WindNinja_cli windninja_cli; do
                if docker run --rm --entrypoint sh "$IM:latest" -c "command -v $BIN" 2>/dev/null; then
                  FOUND="$IM"; echo "IMG=$IM" >> $GITHUB_OUTPUT; echo "BIN=$BIN" >> $GITHUB_OUTPUT
                  echo "  -> $BIN trobat"; break
                fi
              done
            else
              echo "  pull FALLA"
            fi
            echo "::endgroup::"
            [ -n "$FOUND" ] && break
          done
          if [ -z "$FOUND" ]; then echo "CAP imatge utilitzable"; exit 1; fi
          echo "IMATGE TRIADA: $FOUND"
          docker images | head -5

      - name: Opcions del CLI (per a saber els noms exactes dels paràmetres)
        continue-on-error: true
        run: |
          docker run --rm --entrypoint ${{ steps.img.outputs.BIN }} ${{ steps.img.outputs.IMG }}:latest --help 2>&1 | tee wn/CLI_HELP.txt >/dev/null
          docker run --rm --entrypoint ${{ steps.img.outputs.BIN }} ${{ steps.img.outputs.IMG }}:latest --runtime_options 2>&1 | tee wn/CLI_OPTIONS.txt >/dev/null
          echo "opcions totals: $(grep -c -- '--' wn/CLI_OPTIONS.txt || echo 0)"
          echo "--- les que fem servir hi són? ---"
          for o in num_threads elevation_file initialization_method input_speed input_speed_units \
                   input_direction input_wind_height units_input_wind_height output_wind_height \
                   units_output_wind_height vegetation mesh_resolution units_mesh_resolution \
                   write_ascii_output momentum_flag number_of_iterations wx_station_filename \
                   output_path output_speed_units; do
            grep -q -- "--$o" wn/CLI_OPTIONS.txt && echo "  OK   $o" || echo "  NO   $o"
          done

      - name: T1 · solver de MASSA (vent mitjà)
        continue-on-error: true
        run: |
          set -o pipefail
          t0=$(date +%s)
          /usr/bin/time -v docker run --rm -v "$PWD/wn/t1_domini_massa":/data \
            --entrypoint ${{ steps.img.outputs.BIN }} ${{ steps.img.outputs.IMG }}:latest /data/run.cfg 2>&1 | tee wn/t1.log | tail -25
          echo "=== T1 MASSA: $(( $(date +%s) - t0 )) s ==="
          ls -la wn/t1_domini_massa | head -20

      - name: T2 · solver de MASSA + MOMENT (CFD)
        continue-on-error: true
        run: |
          set -o pipefail
          t0=$(date +%s)
          /usr/bin/time -v docker run --rm -v "$PWD/wn/t2_domini_moment":/data \
            --entrypoint ${{ steps.img.outputs.BIN }} ${{ steps.img.outputs.IMG }}:latest /data/run.cfg 2>&1 | tee wn/t2.log | tail -30
          echo "=== T2 MOMENT: $(( $(date +%s) - t0 )) s ==="
          ls -la wn/t2_domini_moment | head -20

      - name: T3 · inicialització per PUNTS (estacions reals)
        continue-on-error: true
        run: |
          set -o pipefail
          if [ -d wn/t3_punts_massa ]; then
            t0=$(date +%s)
            /usr/bin/time -v docker run --rm -v "$PWD/wn/t3_punts_massa":/data \
              --entrypoint ${{ steps.img.outputs.BIN }} ${{ steps.img.outputs.IMG }}:latest /data/run.cfg 2>&1 | tee wn/t3.log | tail -30
            echo "=== T3 PUNTS: $(( $(date +%s) - t0 )) s ==="
            ls -la wn/t3_punts_massa | head -20
          else
            echo "sense estacions: prova omesa"
          fi

      - name: Resum
        if: always()
        run: |
          echo "================ RESUM ================"
          for t in t1 t2 t3; do
            d=$(ls -d wn/${t}_* 2>/dev/null | head -1)
            n=$(find $d -name '*.asc' 2>/dev/null | wc -l)
            echo "--------- $t ($d): $n fitxers .asc ---------"
            [ -f wn/$t.log ] && { echo '   >>> LOG SENCER:'; cat wn/$t.log | head -40; } || echo '   (sense log)'
          done
          echo "--------- AJUDA DEL CLI ---------"
          head -50 wn/CLI_HELP.txt 2>/dev/null || echo '(buit: el binari no respon a --help)'
          du -sh wn 2>/dev/null || true

      - name: Puja els resultats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windninja-prova
          retention-days: 14
          path: |
            wn/**/*.asc
            wn/**/*.prj
            wn/*.log
            wn/CLI_HELP.txt
            wn/**/run.cfg
            wn/estacions/*.csv
